---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedder-service
  namespace: tenant-a
  labels:
    app: embedder-service
    tenant: tenant-a
    model-type: embedding
spec:
  replicas: 2
  selector:
    matchLabels:
      app: embedder-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: embedder-service
        tenant: tenant-a
    spec:
      serviceAccountName: bedrock-sa
      containers:
        - name: embedder
          image: jabari/embedder-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: DYNAMODB_TABLE
              value: "ai-inference-logs"
            - name: TENANT_ID
              value: "tenant-a"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: embedder-service
  namespace: tenant-a
  labels:
    app: embedder-service
spec:
  selector:
    app: embedder-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
