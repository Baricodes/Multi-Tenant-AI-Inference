apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Registry host uses __AWS_ACCOUNT_ID__; scripts/06_apply-k8s-manifests.sh substitutes it at apply time.
images:
  - name: jabari/summarizer-service
    newName: __AWS_ACCOUNT_ID__.dkr.ecr.us-east-1.amazonaws.com/jabari/summarizer-service
    newTag: latest
  - name: jabari/generator-service
    newName: __AWS_ACCOUNT_ID__.dkr.ecr.us-east-1.amazonaws.com/jabari/generator-service
    newTag: latest
  - name: jabari/embedder-service
    newName: __AWS_ACCOUNT_ID__.dkr.ecr.us-east-1.amazonaws.com/jabari/embedder-service
    newTag: latest

# Order: namespaces and RBAC before workloads; HPA after its Deployment; Ingress after Services.
resources:
  - namespaces.yaml
  - rbac-tenant-a.yaml
  - rbac-tenant-b.yaml
  - summarizer-deployment.yaml
  - generator-deployment.yaml
  - embedder-deployment.yaml
  - hpa-summarizer.yaml
  - ingress-tenant-a.yaml
  - ingress-tenant-b.yaml
